name: Patch CMS Admin UI

on:
  push:
    paths:
      - '.github/workflows/patch-cms-admin.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-cms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch admin/cms.html safely
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('admin/cms.html')
          s = p.read_text(encoding='utf-8')
          original = s

          # 1) Update visible admin version only.
          for old in ['v1.0.1','v1.2.0','v1.3.0','v1.3.1','v1.3.2']:
              s = s.replace(old, 'v1.3.3')

          # 2) Add sidebar links without touching old section logic.
          if 'إدارة عروض الباقات' not in s:
              marker = '''      <div class="nav-section" style="margin-top:.75rem">الموقع</div>'''
              insert = '''      <div class="nav-section" style="margin-top:.75rem">إضافات الإدارة</div>
      <a class="nav-item" href="./offers.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 1 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 1 0 0-5C13 2 12 7 12 7z"/></svg>
        إدارة عروض الباقات
      </a>
      <a class="nav-item" href="./comments.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/><path d="M8 10h8M8 14h5"/></svg>
        إدارة التعليقات
      </a>

'''
              if marker in s:
                  s = s.replace(marker, insert + marker, 1)

          # 3) Add cards inside the main content cards area, after referral card.
          if 'فتح العروض ←' not in s:
              referral_end = '''          <div class="card" onclick="openEditor('json','referral')" style="cursor:pointer">
            <div class="card-icon" style="font-size:1.25rem;line-height:1">🎁</div>
            <div class="card-title">نظام جيب صديق</div>
            <div class="card-desc">تفعيل التوصية، قيمة الخصم بالعملات الثلاثة، النصوص</div>
            <div class="card-arrow">فتح المحرر ←</div>
          </div>
'''
              new_cards = referral_end + '''
          <a class="card" href="./offers.html" style="cursor:pointer">
            <div class="card-icon" style="font-size:1.25rem;line-height:1">🎁</div>
            <div class="card-title">إدارة عروض الباقات</div>
            <div class="card-desc">تفعيل أو إيقاف العرض، وتعديل وصف عرض 3 شهور + شهر مجاني</div>
            <div class="card-arrow">فتح العروض ←</div>
          </a>

          <a class="card" href="./comments.html" style="cursor:pointer">
            <div class="card-icon" style="font-size:1.25rem;line-height:1">💬</div>
            <div class="card-title">إدارة التعليقات</div>
            <div class="card-desc">مراجعة تعليقات العملاء، قبول، رفض، وتعديل التعليقات</div>
            <div class="card-arrow">فتح التعليقات ←</div>
          </a>
'''
              if referral_end in s:
                  s = s.replace(referral_end, new_cards, 1)

          if s == original:
              print('No changes applied. CMS may already be patched.')
          else:
              p.write_text(s, encoding='utf-8')
              print('CMS patched successfully.')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/cms.html
          git commit -m "feat: add offers and comments cards to CMS"
          git push
