name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: test -f _site/en/index.html
      - run: test -f _site/en/home-v2/index.html
      - run: test -f _site/ar/index.html
      - run: test -f _site/ar/home-v2/index.html
      - run: cmp -s _site/en/index.html _site/en/home-v2/index.html
      - run: cmp -s _site/ar/index.html _site/ar/home-v2/index.html
