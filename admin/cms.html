<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CMS</title>
    <script>
        // Versioning system
        let version = 1;
        function incrementVersion() {
            version++;
            document.getElementById('version-display').innerText = 'Version: ' + version;
        }
        function saveChanges() {
            alert('Changes saved! The changes will be reflected on the website immediately.');
            incrementVersion();
        }
    </script>
</head>
<body>
    <div id="topbar">
        <span id="version-display">Version: 1</span>
        <button onclick="saveChanges()">Save Changes</button>
    </div>
    <h1>Welcome to Admin CMS</h1>
    <p>Edit your content here.</p>
</body>
</html>
