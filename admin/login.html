<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>تسجيل الدخول — O2F.life</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:  #0B1220;
      --mint: #00D9A3;
      --gold: #C9A84A;
      --off:  #F7F8FA;
      --muted: rgba(247,248,250,.5);
      --line: rgba(255,255,255,.08);
    }
    body {
      background: var(--ink); color: var(--off);
      font-family: 'Tajawal', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      margin: 1rem;
    }
    .logo {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 2rem;
    }
    .logo-mark {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--mint), var(--gold));
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 1.2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--mint), var(--gold));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    h1 { font-size: 1.3rem; margin-bottom: .4rem; }
    .subtitle { font-size: .875rem; color: var(--muted); margin-bottom: 1.75rem; }

    .field { display: grid; gap: .4rem; margin-bottom: 1rem; }
    label { font-size: .8rem; color: var(--muted); }
    input[type="password"] {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      color: var(--off);
      padding: .75rem 1rem;
      font-family: inherit; font-size: .95rem;
      width: 100%; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="password"]:focus {
      border-color: rgba(0,217,163,.5);
      box-shadow: 0 0 0 3px rgba(0,217,163,.12);
    }
    .btn {
      width: 100%; padding: .8rem;
      background: var(--mint); color: var(--ink);
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: .5rem;
      transition: filter .15s, transform .15s;
    }
    .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .error {
      font-size: .82rem; color: #fca5a5;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px;
      padding: .6rem .9rem;
      margin-top: .75rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark"></div>
      <div>
        <div class="logo-text">O2F.life</div>
        <div class="logo-sub">لوحة التحكم</div>
      </div>
    </div>

    <h1>تسجيل الدخول</h1>
    <p class="subtitle">أدخل كلمة المرور للوصول إلى لوحة التحكم</p>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="pass">كلمة المرور</label>
        <input type="password" id="pass" placeholder="••••••••" autofocus autocomplete="current-password">
      </div>
      <button class="btn" type="submit" id="loginBtn">دخول</button>
      <div class="error" id="errMsg">كلمة المرور غير صحيحة. حاول مرة أخرى.</div>
    </form>
  </div>

  <script>
    // SHA-256 hash of the admin password (never store plaintext)
    const PASS_HASH = '4008e341d0e8c6dc730352116664e0eadc13b56b6a6c82e8c8d91cb45992c6f6';

    // Redirect immediately if already authenticated
    if (sessionStorage.getItem('o2f-admin-auth') === '1') {
      window.location.replace('./cms.html');
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256',
        new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn  = document.getElementById('loginBtn');
      const pass = document.getElementById('pass').value;
      const err  = document.getElementById('errMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'جاري التحقق...';

      const hash = await sha256(pass);
      if (hash === PASS_HASH) {
        sessionStorage.setItem('o2f-admin-auth', '1');
        window.location.replace('./cms.html');
      } else {
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'دخول';
        document.getElementById('pass').value = '';
        document.getElementById('pass').focus();
      }
    }
  </script>
</body>
</html>
